name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Solidity Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: contracts
        run: npm install

      - name: Compile contract
        working-directory: contracts
        run: npx hardhat compile

      - name: Run tests
        working-directory: contracts
        run: npx hardhat test
